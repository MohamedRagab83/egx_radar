<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>EGX Radar Login</title>
    <style>
        body { font-family: Arial, sans-serif; background: #f5f7fb; margin: 0; padding: 0; }
        .container { max-width: 420px; margin: 60px auto; background: #fff; padding: 24px; border-radius: 12px; box-shadow: 0 8px 24px rgba(0,0,0,0.08); }
        h1 { margin-top: 0; color: #102542; }
        label { display: block; margin: 12px 0 6px; font-weight: 600; }
        input { width: 100%; box-sizing: border-box; padding: 10px; border: 1px solid #ccd4e0; border-radius: 8px; }
        button { margin-top: 16px; width: 100%; background: #102542; color: #fff; border: 0; padding: 12px; border-radius: 8px; cursor: pointer; }
        .message { padding: 10px 12px; border-radius: 8px; margin-bottom: 12px; }
        .message.error { background: #fde8e8; color: #8a1c1c; }
        .message.success { background: #e8f7ec; color: #19663a; }
        .helper { margin-top: 16px; text-align: center; }
        a { color: #0b63ce; text-decoration: none; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Login</h1>
        <p>Sign in to view the latest EGX Radar scan results.</p>

        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="message {{ category }}">{{ message }}</div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <form method="post">
            <label for="email">Email</label>
            <input id="email" name="email" type="email" required>

            <label for="password">Password</label>
            <input id="password" name="password" type="password" required>

            <button type="submit">Login</button>
        </form>

        <div class="helper">
            New here? <a href="{{ url_for('dashboard.register') }}">Create an account</a>
        </div>
    </div>
</body>
</html>
