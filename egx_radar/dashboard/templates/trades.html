<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trades - EGX Radar</title>
</head>
<body>
    <nav class="navbar">
        <div class="navbar-brand"><span class="status-indicator"></span> EGX Radar</div>
        <ul class="navbar-nav">
            <li><a href="/" class="nav-link" data-page="dashboard">Dashboard</a></li>
            <li><a href="/backtests" class="nav-link" data-page="backtests">Backtests</a></li>
            <li><a href="/trades" class="nav-link active" data-page="trades">Trades</a></li>
            <li><a href="/signals" class="nav-link" data-page="signals">Signals</a></li>
            <li><a href="/settings" class="nav-link" data-page="settings">Settings</a></li>
        </ul>
    </nav>
    <div class="container">
        <div class="header"><h1>Trades Browser</h1><p>Detailed analysis of individual trades</p></div>
        <div id="alerts"></div>
        <div class="section">
            <div class="section-header">
                <h2 class="section-title">Trade History</h2>
                <div class="btn-group">
                    <select id="filter-backtest" style="padding: 0.5rem; border: 1px solid #334155; border-radius: 0.375rem; background: #334155; color: #e2e8f0;">
                        <option value="">Select backtest...</option>
                    </select>
                    <select id="filter-result" style="padding: 0.5rem; border: 1px solid #334155; border-radius: 0.375rem; background: #334155; color: #e2e8f0;">
                        <option value="">All Results</option>
                        <option value="win">Wins</option>
                        <option value="loss">Losses</option>
                    </select>
                    <button class="secondary" id="btn-refresh">Refresh</button>
                </div>
            </div>
            <div class="chart-container">
                <table class="data-table">
                    <thead>
                        <tr>
                            <th>Symbol</th>
                            <th>Entry Date</th>
                            <th>Entry Price</th>
                            <th>Exit Date</th>
                            <th>Exit Price</th>
                            <th>Duration</th>
                            <th>Result</th>
                            <th>P&L</th>
                            <th>P&L %</th>
                        </tr>
                    </thead>
                    <tbody id="trades-tbody">
                        <tr><td colspan="9" style="text-align: center; padding: 2rem;">Select a backtest to view trades</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif; background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%); color: #e2e8f0; min-height: 100vh; margin: 0; padding: 0; }
        .navbar { background: rgba(15, 23, 42, 0.95); border-bottom: 1px solid #334155; padding: 1rem 2rem; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; }
        .navbar-brand { font-size: 1.5rem; font-weight: bold; color: #00d9ff; display: flex; align-items: center; gap: 0.5rem; }
        .navbar-nav { display: flex; gap: 2rem; list-style: none; }
        .navbar-nav a { color: #cbd5e1; text-decoration: none; transition: color 0.3s; }
        .navbar-nav a.active { color: #00d9ff; }
        .status-indicator { width: 12px; height: 12px; border-radius: 50%; background: #22c55e; display: inline-block; margin-right: 0.5rem; animation: pulse 2s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        .container { max-width: 1400px; margin: 0 auto; padding: 2rem; }
        .header { margin-bottom: 2rem; }
        .header h1 { font-size: 2rem; margin-bottom: 0.5rem; }
        .header p { color: #94a3b8; }
        .section { margin-bottom: 2rem; }
        .section-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; }
        .section-title { font-size: 1.25rem; font-weight: 600; }
        .btn-group { display: flex; gap: 0.5rem; }
        button, select { border: 1px solid #334155; padding: 0.5rem 1rem; border-radius: 0.375rem; cursor: pointer; font-weight: 500; transition: all 0.3s; }
        button { background: #00d9ff; color: #0f172a; }
        button:hover { background: #06b6d4; }
        button.secondary { background: #334155; color: #e2e8f0; }
        button.secondary:hover { background: #475569; }
        .chart-container { background: rgba(30, 41, 59, 0.8); border: 1px solid #334155; border-radius: 0.5rem; padding: 1.5rem; }
        .data-table { width: 100%; border-collapse: collapse; }
        .data-table thead { background: rgba(51, 65, 85, 0.5); border-bottom: 1px solid #334155; }
        .data-table th { padding: 1rem; text-align: left; font-weight: 600; color: #cbd5e1; text-transform: uppercase; font-size: 0.75rem; letter-spacing: 0.05em; }
        .data-table td { padding: 1rem; border-bottom: 1px solid #334155; }
        .data-table tbody tr:hover { background: rgba(51, 65, 85, 0.3); }
        .badge { display: inline-block; padding: 0.25rem 0.75rem; border-radius: 9999px; font-size: 0.75rem; font-weight: 600; }
        .badge.win { background: rgba(34, 197, 94, 0.2); color: #22c55e; }
        .badge.loss { background: rgba(239, 68, 68, 0.2); color: #ef4444; }
    </style>
    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
    <script>
        const socket = io();
        let selectedBacktest = null;

        async function loadBacktests() {
            try {
                const response = await fetch('/api/backtests?limit=100');
                const data = await response.json();
                const select = document.getElementById('filter-backtest');
                
                if (data.success) {
                    data.backtests.forEach(bt => {
                        const option = document.createElement('option');
                        option.value = bt.id;
                        option.textContent = `${bt.backtest_id} (${new Date(bt.date).toLocaleDateString()})`;
                        select.appendChild(option);
                    });
                }
            } catch (error) {
                console.error('Error loading backtests:', error);
            }
        }

        async function loadTrades() {
            if (!selectedBacktest) return;
            
            try {
                const result = document.getElementById('filter-result').value;
                let url = `/api/trades?backtest_id=${selectedBacktest}`;
                if (result) url += `&result=${result}`;
                
                const response = await fetch(url);
                const data = await response.json();
                const tbody = document.getElementById('trades-tbody');
                tbody.innerHTML = '';
                
                if (!data.success || data.trades.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="9" style="text-align: center; padding: 2rem;">No trades found</td></tr>';
                    return;
                }
                
                data.trades.forEach(trade => {
                    const row = document.createElement('tr');
                    row.innerHTML = `
                        <td>${trade.symbol}</td>
                        <td>${new Date(trade.entry_date).toLocaleDateString()}</td>
                        <td>$${trade.entry_price.toFixed(2)}</td>
                        <td>${trade.exit_date ? new Date(trade.exit_date).toLocaleDateString() : '-'}</td>
                        <td>${trade.exit_price ? '$' + trade.exit_price.toFixed(2) : '-'}</td>
                        <td>${trade.duration_minutes ? trade.duration_minutes + ' min' : '-'}</td>
                        <td><span class="badge ${trade.result === 'win' ? 'win' : 'loss'}">${trade.result}</span></td>
                        <td style="color: ${trade.pnl > 0 ? '#22c55e' : '#ef4444'}">${trade.pnl > 0 ? '+' : ''}$${trade.pnl.toFixed(2)}</td>
                        <td style="color: ${trade.pnl_pct > 0 ? '#22c55e' : '#ef4444'}">${trade.pnl_pct > 0 ? '+' : ''}${(trade.pnl_pct * 100).toFixed(2)}%</td>
                    `;
                    tbody.appendChild(row);
                });
            } catch (error) {
                console.error('Error loading trades:', error);
            }
        }

        document.getElementById('filter-backtest').addEventListener('change', function() {
            selectedBacktest = this.value;
            loadTrades();
        });

        document.getElementById('filter-result').addEventListener('change', loadTrades);
        document.getElementById('btn-refresh').addEventListener('click', loadTrades);

        socket.on('connect', loadBacktests);
        loadBacktests();
    </script>
</body>
</html>
