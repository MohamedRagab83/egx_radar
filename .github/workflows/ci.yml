name: CI Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  schedule:
    - cron: '0 0 * * *'  # Daily run at midnight

jobs:
  test:
    name: Test Suite
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.8', '3.9', '3.10', '3.11']
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}
        cache: 'pip'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest pytest-cov pytest-timeout
    
    - name: Run unit tests
      run: |
        pytest tests/test_unit_engine.py -v --tb=short
      timeout-minutes: 10
    
    - name: Run integration tests
      run: |
        pytest tests/test_integration_pipeline.py -v --tb=short
      timeout-minutes: 15
    
    - name: Run data validation tests
      run: |
        pytest tests/test_data_validation.py -v --tb=short 2>/dev/null || echo "Data validation tests skipped"
      timeout-minutes: 10
    
    - name: Upload coverage
      uses: codecov/codecov-action@v3
      with:
        fail_ci_if_error: false

  performance:
    name: Performance Benchmarks
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
        cache: 'pip'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest pytest-benchmark
    
    - name: Run performance benchmarks
      run: |
        pytest tests/test_performance_benchmarks.py -v -m performance --tb=short
      timeout-minutes: 30
    
    - name: Store benchmark results
      if: always()
      uses: actions/upload-artifact@v3
      with:
        name: benchmark-results
        path: .benchmarks/

  lint:
    name: Code Quality
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
    
    - name: Install tools
      run: |
        python -m pip install --upgrade pip
        pip install flake8 black isort
    
    - name: Check formatting (black)
      run: |
        black --check egx_radar tests || true
    
    - name: Check imports (isort)
      run: |
        isort --check-only egx_radar tests || true
    
    - name: Lint with flake8
      run: |
        flake8 egx_radar tests --count --select=E9,F63,F7,F82 --show-source --statistics || true

  build:
    name: Build Package
    runs-on: ubuntu-latest
    needs: [test, lint]
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
    
    - name: Install build dependencies
      run: |
        python -m pip install --upgrade pip
        pip install build wheel setuptools
    
    - name: Build distribution
      run: |
        python -m build
    
    - name: Upload artifacts
      uses: actions/upload-artifact@v3
      with:
        name: python-package-distributions
        path: dist/
